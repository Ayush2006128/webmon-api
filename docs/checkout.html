<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Webmon API</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-container {
            max-width: 500px;
            margin: 4rem auto;
            text-align: center;
        }
        
        .checkout-card {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
            padding: 3rem 2rem;
        }

        .amount-display {
            font-size: 3.5rem;
            font-weight: 300;
            background-image: var(--noise-pattern), linear-gradient(180deg, #ffffff 0%, #a1a1aa 100%);
            background-blend-mode: overlay, normal;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.9)) drop-shadow(0px -1px 1px rgba(255,255,255,0.15));
            margin-bottom: 0.5rem;
        }

        .order-id-display {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-family: monospace;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius-pill);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-message {
            margin-top: 1rem;
            font-size: 0.9rem;
            min-height: 1.5rem;
            color: var(--accent-cyan);
        }

        .status-message.error {
            color: var(--accent-pink);
        }

        .status-message.success {
            color: #00E676;
        }

        #pay-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 1rem;
            font-size: 1rem;
        }
        
        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 1.5rem;
            height: 1.5rem;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent-cyan);
            animation: spin 1s ease-in-out infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="page-legal">
    <div class="glow-bg"></div>
    <div id="canvas-container"><canvas></canvas></div>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <div class="logo-icon"></div>
            <span class="logo-text">Webmon</span>
        </a>
    </nav>

    <div class="container checkout-container">
        <div class="tech-card checkout-card" id="checkout-card">
            <h1 class="section-heading" style="margin-bottom: 0;">Complete Payment</h1>
            
            <div id="loading-state">
                <div class="spinner"></div>
                <p>Loading order details...</p>
            </div>

            <div id="payment-details" style="display: none; width: 100%; flex-direction: column; align-items: center;">
                <p>Amount to Pay</p>
                <div class="amount-display">₹<span id="display-amount">0</span></div>
                <div class="order-id-display">Order: <span id="display-order-id">---</span></div>
                
                <button id="pay-btn" class="btn primary">Pay Now</button>
                <div id="status-msg" class="status-message"></div>
            </div>
            
            <div id="success-state" style="display: none; width: 100%; flex-direction: column; align-items: center; gap: 1rem;">
                <div style="font-size: 4rem; color: #00E676;">✓</div>
                <h2 class="section-heading" style="margin-bottom: 0;">Payment Successful</h2>
                <p style="color: var(--text-secondary);">Your credits have been updated.</p>
                <p style="font-size: 0.85rem; color: rgba(255,255,255,0.5);">You can close this window and return to Discord.</p>
            </div>
            
            <div id="error-state" style="display: none; width: 100%; flex-direction: column; align-items: center; gap: 1rem;">
                <div style="font-size: 4rem; color: var(--accent-pink);">✗</div>
                <h2 class="section-heading" style="margin-bottom: 0;">Invalid Link</h2>
                <p id="error-msg" style="color: var(--text-secondary);">Missing required parameters.</p>
            </div>
        </div>
    </div>
    <!-- Background Three.js effect -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="three-bg.js"></script>
    <!-- Razorpay checkout -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="checkout.js"></script>
    
</body>
</html>
